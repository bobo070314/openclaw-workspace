repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (check + fix)
        entry: python -m ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff (format)
        entry: python -m ruff format
        language: system
        types: [python]
        pass_filenames: true
