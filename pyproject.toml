[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["node_modules", ".git", "__pycache__", ".venv", "gh-enterprise-baseline", "skills/black/**"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D"]
ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
